name: CD

on:
  push:
    tags:
      - '*'

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
            artifact: HATinstaller-win-x64.exe
          - os: ubuntu-latest
            rid: linux-x64
            artifact: HATinstaller-linux-x64
          - os: macos-latest
            rid: osx-x64
            artifact: HATinstaller-osx-x64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.x'

      - name: Publish installer
        run: dotnet publish Cli/FEZ.HAT.cli.csproj -c Release -r ${{ matrix.rid }}

      - name: Rename artifact
        shell: bash
        run: |
          src=$(find Cli/bin/Release -name 'HATinstaller' -o -name 'HATinstaller.exe' | head -1)
          mv "$src" "${{ matrix.artifact }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}
          if-no-files-found: error

  release:
    if: github.repository == 'FEZModding/HAT'
    needs: [ build ]
    runs-on: ubuntu-latest
    steps:
      - name: Download installers
        uses: actions/download-artifact@v4

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          body: |
            ## Installation

            Download the installer for your platform and run it.

            | Platform | File |
            |----------|------|
            | Windows  | `HATinstaller-win-x64.exe` |
            | Linux    | `HATinstaller-linux-x64` |
            | macOS    | `HATinstaller-osx-x64` |

            FEZ will be detected automatically from your Steam or GOG library.
            If detection fails, drop the installer into your FEZ game folder
            and run it from there, or use `--path <dir>`.
          
          files: |
            HATinstaller-win-x64.exe/HATinstaller-win-x64.exe
            HATinstaller-linux-x64/HATinstaller-linux-x64
            HATinstaller-osx-x64/HATinstaller-osx-x64
          
          fail_on_unmatched_files: true