name: CD

on:
  push:
    tags:
      - '*'

jobs:
  build-plugin:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '9.0.x'

      - name: Restore packages
        run: dotnet restore Plugin/FEZ.HAT.mm.csproj

      - name: Build plugin
        run: dotnet build Plugin/FEZ.HAT.mm.csproj -c Release

      - name: Upload plugin
        uses: actions/upload-artifact@v7
        with:
          name: HAT
          path: Plugin/bin/Release/
          if-no-files-found: error

  build-installer:
    needs: [ build-plugin ]
    strategy:
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
            artifact: HATinstaller-win-x64.exe
          - os: ubuntu-latest
            rid: linux-x64
            artifact: HATinstaller-linux-x64
          - os: macos-latest
            rid: osx-x64
            artifact: HATinstaller-osx-x64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '9.0.x'

      - name: Download plugin
        uses: actions/download-artifact@v8
        with:
          name: HAT
          path: Plugin/bin/Release/

      - name: Publish installer
        run: dotnet publish Installer/FEZ.HAT.Installer.csproj -c Release -r ${{ matrix.rid }} -p:BuildProjectReferences=false

      - name: Rename artifact
        shell: bash
        run: |
          src=$(find Installer/bin/Release -path '*/publish/HATinstaller' -o -path '*/publish/HATinstaller.exe' | head -1)
          mv "$src" "${{ matrix.artifact }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}
          if-no-files-found: error

  release:
    if: github.repository == 'FEZModding/HAT'
    needs: [ build-installer ]
    runs-on: ubuntu-latest
    steps:
      - name: Download installers
        uses: actions/download-artifact@v8

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          body: |
            ## Installation

            Download the installer for your platform and run it.

            | Platform | File |
            |----------|------|
            | Windows  | `HATinstaller-win-x64.exe` |
            | Linux    | `HATinstaller-linux-x64` |
            | macOS    | `HATinstaller-osx-x64` |

            FEZ will be detected automatically from your Steam or GOG library.
            If detection fails, drop the installer into your FEZ game folder
            and run it from there, or use `--path <dir>`.

          files: |
            HATinstaller-win-x64.exe/HATinstaller-win-x64.exe
            HATinstaller-linux-x64/HATinstaller-linux-x64
            HATinstaller-osx-x64/HATinstaller-osx-x64

          fail_on_unmatched_files: true
